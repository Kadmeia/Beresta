name: QA Testing Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.9
      uses: actions/setup-python@v4
      with:
        python-version: "3.9"

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-gi python3-gi-cairo gir1.2-gtk-3.0 gir1.2-webkit2-4.0 xvfb tesseract-ocr tesseract-ocr-rus
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install pytest pytest-mock pytest-playwright fitz PyMuPDF
        playwright install chromium

    - name: Run Backend Unit Tests
      run: |
        xvfb-run -a pytest tests/test_backend.py -v

    - name: Run Frontend E2E Tests
      run: |
        xvfb-run -a pytest tests/test_frontend.py -v
